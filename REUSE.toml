version = 1

[[annotations]]
path = [
  ".gitignore",
  ".python-version",
  "pyproject.toml",
  "README.md",
  "REUSE.toml",
  "src/**.py",
  "src/**/py.typed",
]
SPDX-FileCopyrightText = "Ianis Vasilev <ianis@ivasilev.net>"
SPDX-License-Identifier = "Unlicense"

# It seems appropriate to license example configurations as CC0
[[annotations]]
path = [
  "viat_sample/config.toml",
  "viat_sample/schema.json",
]
SPDX-FileCopyrightText = "Ianis Vasilev <ianis@ivasilev.net>"
SPDX-License-Identifier = "CC0-1.0"

# The REUSE documentation suggests licensing generated files under CC0-1.0 with NONE as author.
# https://reuse.software/faq/#exclude-file
[[annotations]]
path = [
  "uv.lock",
]
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"
